<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>CD012</title>
<style>
* { margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #231F20; }
#unity-canvas { width: 100%; height: 100%; }
</style>
</head>
<body>
<canvas id="unity-canvas" tabindex="-1"></canvas>
<!-- TikTok Mini Games SDK -->
<script src="https://developers.tiktok.com/js/minis.js"></script>
<script>
  // ── 发布前替换为实际值 ──
  window.CD_TIKTOK_CLIENT_KEY = 'sbaw6bjy6uv7a0srwt';
  window.CD_TIKTOK_AD_UNIT_ID = '__TIKTOK_AD_UNIT_ID__'; // 在 Developer Portal Monetization 页面创建广告位后替换

  try {
    TTMinis.game.init({ clientKey: window.CD_TIKTOK_CLIENT_KEY });
  } catch (e) {
    console.warn('[TikTok] SDK init skipped:', e);
  }
</script>
<script src="Build/TikTok.loader.js"></script>
<script>
  createUnityInstance(document.querySelector("#unity-canvas"), {
    dataUrl:             "Build/TikTok.data",
    frameworkUrl:        "Build/TikTok.framework.js",
    codeUrl:             "Build/TikTok.wasm",
    streamingAssetsUrl:  "StreamingAssets",
    companyName:         "DefaultCompany",
    productName:         "CD012",
    productVersion:      "0.1.0",
  }, function (progress) {
    try {
      TTMinis.game.setLoadingProgress({
        progress: Math.min(progress, 1)
      });
    } catch (e) {}
  }).then(function (instance) {
    window.unityInstance = instance;
  }).catch(function (err) {
    console.error('[TikTok] Unity load error:', err);
  });
</script>
</body>
</html>
