<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>CD012</title>
<style>
* { margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #231F20; }
#unity-canvas { width: 100%; height: 100%; }
#loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); color: #fff; font-family: sans-serif; font-size: 18px; }
</style>
</head>
<body>
<canvas id="unity-canvas" tabindex="-1"></canvas>
<div id="loading">Loading... 0%</div>
<!-- TikTok SDK: async so it doesn't block Unity -->
<script src="https://developers.tiktok.com/js/minis.js" async></script>
<script>
  window.CD_TIKTOK_CLIENT_KEY = 'sbaw6bjy6uv7a0srwt';
  window.CD_TIKTOK_AD_UNIT_ID = '__TIKTOK_AD_UNIT_ID__';
  function _tryTikTokInit() {
    try {
      if (typeof TTMinis !== 'undefined' && TTMinis.game) {
        TTMinis.game.init({ clientKey: window.CD_TIKTOK_CLIENT_KEY });
      }
    } catch (e) { console.warn('[TikTok] SDK init skipped:', e); }
  }
  setTimeout(_tryTikTokInit, 2000);
</script>
<script src="Build/TikTok.loader.js"></script>
<script>
  var loadingDiv = document.getElementById('loading');
  createUnityInstance(document.querySelector("#unity-canvas"), {
    dataUrl:             "Build/TikTok.data",
    frameworkUrl:        "Build/TikTok.framework.js",
    codeUrl:             "Build/TikTok.wasm",
    streamingAssetsUrl:  "StreamingAssets",
    companyName:         "CDGames",
    productName:         "CD012",
    productVersion:      "0.1.0",
  }, function (progress) {
    if (loadingDiv) loadingDiv.textContent = 'Loading... ' + Math.round(progress * 100) + '%';
    try {
      if (typeof TTMinis !== 'undefined' && TTMinis.game) {
        TTMinis.game.setLoadingProgress({ progress: Math.min(progress, 1) });
      }
    } catch (e) {}
  }).then(function (instance) {
    window.unityInstance = instance;
    if (loadingDiv) loadingDiv.style.display = 'none';
  }).catch(function (err) {
    if (loadingDiv) loadingDiv.textContent = 'Error: ' + err;
    console.error('[Unity] Load error:', err);
  });
</script>
</body>
</html>
